<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        div.caixa {
            box-sizing:border-box;
            border: 1px solid #5a5a5a;
            width: 150px;
            height: 150px;
            margin: 4px;
            display: inline-block;
        }

        div.caixao {
            background-color: #ddcaf8;
        }
        div.circulo{
            border-radius: 80px;
        }
        div.fundo{
            background-color: #ddcaf8
        }
        div.caixa.cor1 {
            background-color: #ffff6b;
        }
        div.caixa.cor2 {
            background-color: #adfbad;
        }
        div.caixa.cor3 {
            background-color: #ffc1a9;
        }
    </style>
    <title>Box 4</title>
</head>
<body>
    <div>
        <div class="caixa circulo cor1"></div>
        <div class="caixa circulo cor2"></div>
        <div class="caixa circulo cor1"></div>
    </div>
    <div class="caixao">
        <div class="caixa circulo cor1"></div>
        <div class="caixa circulo cor2"></div>
        <div class="caixa circulo cor2"></div>
    </div>
    <div>
        <div class="caixa circulo cor2"></div>
        <div class="caixa circulo cor2"></div>
        <div class="caixa circulo cor1"></div>
    </div>
</body>
</html>
