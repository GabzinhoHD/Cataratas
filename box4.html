<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxes 1</title>
    <style>

     .caixa{
     display: inline-block;
     }
     .caixa.caixao{
     background-color: #ddcaf8;
     }
     .cor1{

     border: 1px solid #5a5a5a;

     width: 150px;
     margin: 5px ;

     border-radius: 80px;
     }
     .cor2{

     height: 150px;
     width: 150px;
     margin: 5px;
     background-color: #adfbad;
     border-radius: 80px;
     }
     .cor3{
     box-sizing: border-box; 
     border: 1px solid #5a5a5a;
     height: 150px;
     width: 150px;
     margin: 5px;
     border-radius: 80px;
     }
     .cor4{
     box-sizing: border-box; 
     border: 1px solid #5a5a5a;
     height: 150px;
     width: 150px;
     margin: 5px;
     background-color: #ffc1a9;
     border-radius: 80px;
     }

     </style>

</head>
<body>
<div class = "caixa">

   <div class = "cor1"></div>

   </div>

</div>

</html>
